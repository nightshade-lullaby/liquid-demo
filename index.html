<body>

<div class="wallpaper" id="wallpaper"></div>
<div class="noise"></div>

<div class="menu-bar glass">
  <div> Demo</div>
  <div id="clock"></div>
</div>

<div class="desktop" id="desktop"></div>

<div class="window glass hidden" id="calculatorApp">
  <div class="window-header">
    <div class="controls">
      <span class="control red" onclick="closeApp()"></span>
      <span class="control yellow"></span>
      <span class="control green"></span>
    </div>
    <span>Calculator</span>
  </div>
  <div class="window-content">
    <input id="calcInput" placeholder="Type math..." />
    <button onclick="calculate()">=</button>
    <p id="calcResult"></p>
  </div>
</div>

<div class="dock glass" id="dock">
  <img src="icons/finder.png" class="dock-icon">
  <img src="icons/safari.png" class="dock-icon">
  <img src="icons/notes.png" class="dock-icon">
  <img src="icons/calculator.png" class="dock-icon" onclick="openCalculator(event)">
</div>

<script src="script.js"></script>
  </body>
